<!DOCTYPE html>
<html oncontextmenu="return false;">
<head>
    <meta charset="UTF-8">
    <title>RestoNation - ajout d'un restaurant</title>
    <link rel="icon" href="images/burger.png">
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption:wght@700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="title" data-aos="zoom-in-down" data-aos-duration="800" data-aos-delay="200">
            Rest<img src="images/burger.png" data-aos="zoom-out" data-aos-duration="800" data-aos-delay="400">Nation
        </div>
        <div class="undertext">
            <div data-aos="fade-up-right" data-aos-duration="800" data-aos-delay="800">Formulaire de notation.</div>
            <div data-aos="fade-up-left" data-aos-duration="800" data-aos-delay="1000">Gabriel.J & Maxime.T</div>
        </div>
    </header>

    <div data-aos="fade-up" data-aos-duration="800" class="separation"><span class="bef"></span><div class="title">Informations</div><span class="aft"></span></div>
    
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Nom du restaurant<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Nom du restaurant">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Date de test du restaurant<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Date de test du restaurant">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Type de restaurant<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Type de restaurant">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Coût du restaurant<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Coût du restaurant">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Qualité globale<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Qualité globale">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Rapport Quantité/Qualité prix<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Rapport Quantité/Qualité prix">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Testeurs du restaurant<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Testeurs du restaurant">
            </div>
        </div>
    </section>
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Dark kitchen<span style="color: rgb(185, 0, 0);">*</span></div>
            <div class="content">
                <input class="write" type="text" placeholder="Dark kitchen">
            </div>
        </div>
    </section>
    
    <div data-aos="fade-up" data-aos-duration="800" class="separation"><span class="bef"></span><div class="title">Choix</div><span class="aft"></span></div>

    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Site Web</div>
            <div class="content">
                <input class="write" type="text" placeholder="Site Web">
            </div>
        </div>
    </section>

    <div data-aos="fade-up" data-aos-duration="800" class="separation"><span class="bef"></span><div class="title">Liens</div><span class="aft"></span></div>
    
    <section data-aos="fade-up" data-aos-duration="800">
        <div class="block">
            <div class="title">Site Web</div>
            <div class="content">
                <input class="write" type="text" placeholder="Site Web">
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script src="script.js"></script>
</body>
</html>
